<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>COZU 禮贈品查詢系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#ffffff;
    --bg-soft:#f7f7f7;
    --ink:#1a1a1a;
    --ink-2:#888888;
    --line:#e5e5e5;
    --hover:#f0f0f0;
    --radius:7px;
    --rail:248px;
    --font:"Mulish","Noto Sans TC",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font);
    font-size:13px;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  ::selection{background:#e8e8e8;}
  button{font-family:inherit;cursor:pointer;}
  a{color:inherit;}

  /* ---- shell ---- */
  .wrap{max-width:1240px;margin:0 auto;padding:0 28px;}
  .topbar{border-bottom:1px solid var(--line);}
  .topbar-inner{display:flex;align-items:center;gap:16px;height:54px;}
  .brand{display:flex;align-items:baseline;gap:9px;}
  .brand b{font-size:15px;font-weight:700;letter-spacing:.01em;white-space:nowrap;}
  .brand span{font-size:11px;color:var(--ink-2);letter-spacing:.04em;white-space:nowrap;}
  .topbar-meta{margin-left:auto;font-size:11px;color:var(--ink-2);white-space:nowrap;}

  /* ---- entry tabs ---- */
  .tabs{display:flex;gap:4px;padding:10px 0 0;}
  .tab{
    display:flex;align-items:center;gap:7px;
    padding:8px 15px;border:1px solid transparent;border-bottom:none;
    border-radius:var(--radius) var(--radius) 0 0;
    font-size:13px;font-weight:500;color:var(--ink-2);white-space:nowrap;
    background:transparent;position:relative;top:1px;
  }
  .tab .ico{width:15px;height:15px;display:block;color:currentColor;}
  .tab.active{color:var(--ink);background:var(--bg);border-color:var(--line);}
  .tab.disabled{cursor:default;color:#bdbdbd;}
  .tab.disabled:hover{background:transparent;}
  .tab:not(.active):not(.disabled):hover{background:var(--hover);}
  .tab .soon{font-size:9px;color:#bdbdbd;border:1px solid var(--line);border-radius:20px;padding:1px 6px;letter-spacing:.03em;}

  .layout{display:grid;grid-template-columns:var(--rail) 1fr;gap:34px;padding:26px 0 80px;align-items:start;}

  /* ---- filter rail ---- */
  .rail{position:sticky;top:18px;}
  .rail-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;}
  .rail-head h2{font-size:12px;font-weight:700;letter-spacing:.06em;color:var(--ink-2);margin:0;text-transform:uppercase;}
  .clear-btn{border:none;background:none;color:var(--ink-2);font-size:11px;padding:2px 4px;border-radius:5px;}
  .clear-btn:hover{color:var(--ink);background:var(--hover);}
  .clear-btn:disabled{opacity:.4;cursor:default;background:none;}

  .fgroup{padding:14px 0;border-top:1px solid var(--line);}
  .fgroup:first-of-type{border-top:none;padding-top:0;}
  .fgroup h3{font-size:12px;font-weight:700;margin:0 0 9px;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{
    border:1px solid var(--line);background:var(--bg);
    border-radius:20px;padding:4px 11px;font-size:11.5px;color:var(--ink);white-space:nowrap;
    transition:background .08s ease;
  }
  .chip:hover{background:var(--hover);}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .opt{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12.5px;color:var(--ink);user-select:none;cursor:pointer;white-space:nowrap;}
  .opt:hover .box{border-color:var(--ink);}
  .box{width:15px;height:15px;border:1px solid #c8c8c8;border-radius:4px;flex:none;display:flex;align-items:center;justify-content:center;}
  .opt.on .box{background:var(--ink);border-color:var(--ink);}
  .box svg{width:10px;height:10px;color:#fff;opacity:0;}
  .opt.on .box svg{opacity:1;}
  .opt .cnt{margin-left:auto;font-size:10.5px;color:#bdbdbd;}

  /* ---- results ---- */
  .res-head{display:flex;align-items:center;gap:12px;margin-bottom:18px;min-height:24px;}
  .res-count{font-size:13px;color:var(--ink);}
  .res-count b{font-weight:700;}
  .active-chips{display:flex;flex-wrap:wrap;gap:6px;}
  .achip{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-2);border:1px solid var(--line);border-radius:20px;padding:2px 5px 2px 9px;}
  .achip button{border:none;background:none;color:#bbb;font-size:13px;line-height:1;padding:0 2px;border-radius:50%;}
  .achip button:hover{color:var(--ink);}

  .grid{display:grid;gap:16px;grid-template-columns:repeat(var(--cols,3),1fr);}
  .card{border:1px solid var(--line);border-radius:var(--radius);background:var(--bg);overflow:hidden;text-align:left;padding:0;transition:background .08s ease,border-color .08s ease;}
  .card:hover{background:var(--bg-soft);border-color:#d6d6d6;}
  .ph{position:relative;background:var(--bg-soft);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:center;}
  .ph.r43{aspect-ratio:4/3;}
  .ph.r11{aspect-ratio:1/1;}
  .ph .ph-x{position:absolute;inset:0;color:#e2e2e2;}
  .ph .ph-x line{stroke:currentColor;stroke-width:1;}
  .ph .ph-label{position:relative;font-size:10.5px;color:#bcbcbc;letter-spacing:.04em;background:var(--bg-soft);padding:2px 6px;}
  .card-body{padding:12px 13px 13px;}
  .card-name{font-size:14px;font-weight:500;line-height:1.35;margin:0 0 6px;}
  .card-price{font-size:13px;font-weight:700;}
  .card-price .note{font-size:10.5px;font-weight:400;color:var(--ink-2);margin-left:6px;}
  .card-meta{margin-top:9px;display:flex;flex-wrap:wrap;gap:5px;}
  .mtag{font-size:10.5px;color:var(--ink-2);border:1px solid var(--line);border-radius:5px;padding:1px 7px;white-space:nowrap;}
  .card-sub{margin-top:8px;font-size:11px;color:var(--ink-2);display:flex;gap:10px;flex-wrap:wrap;}
  .card-sub span{white-space:nowrap;}
  .achip{white-space:nowrap;}
  .pill span{white-space:nowrap;}
  .res-count{white-space:nowrap;}

  /* ---- empty ---- */
  .empty{border:1px dashed var(--line);border-radius:10px;padding:64px 24px;text-align:center;color:var(--ink-2);}
  .empty h4{margin:0 0 6px;font-size:14px;font-weight:700;color:var(--ink);}
  .empty p{margin:0 0 16px;font-size:12.5px;}
  .empty button{border:1px solid var(--line);background:var(--bg);border-radius:6px;padding:7px 16px;font-size:12.5px;}
  .empty button:hover{background:var(--hover);}

  /* ---- coming soon panel ---- */
  .soon-panel{border:1px dashed var(--line);border-radius:10px;padding:80px 24px;text-align:center;color:var(--ink-2);grid-column:1 / -1;}
  .soon-panel h4{margin:0 0 6px;font-size:15px;font-weight:700;color:var(--ink);}
  .soon-panel p{margin:0;font-size:12.5px;}

  /* ---- detail slide-over ---- */
  @keyframes scrimIn{from{opacity:0;}to{opacity:1;}}
  @keyframes peekIn{from{transform:translateX(100%);}to{transform:translateX(0);}}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.18);z-index:40;animation:scrimIn .18s ease both;}
  .peek{position:fixed;top:0;right:0;height:100%;width:440px;max-width:94vw;background:var(--bg);border-left:1px solid var(--line);
    z-index:50;display:flex;flex-direction:column;animation:peekIn .2s ease both;}
  .peek-head{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line);}
  .peek-head .x{margin-left:auto;border:none;background:none;color:var(--ink-2);font-size:18px;line-height:1;width:28px;height:28px;border-radius:6px;}
  .peek-head .x:hover{background:var(--hover);color:var(--ink);}
  .peek-head .lbl{font-size:11px;color:var(--ink-2);letter-spacing:.04em;white-space:nowrap;}
  .peek-body{overflow-y:auto;padding:18px;}
  .peek-img{aspect-ratio:4/3;background:var(--bg-soft);border:1px solid var(--line);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;color:#bcbcbc;font-size:11px;margin-bottom:16px;position:relative;}
  .peek h3{font-size:18px;font-weight:700;margin:0 0 4px;}
  .peek .price-lg{font-size:15px;font-weight:700;margin-bottom:2px;}
  .peek .price-lg .note{font-size:11px;font-weight:400;color:var(--ink-2);margin-left:7px;}
  .dl{margin:18px 0 0;border-top:1px solid var(--line);padding-top:14px;}
  .dl h5{font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--ink-2);text-transform:uppercase;margin:0 0 9px;}
  .row{display:flex;gap:12px;font-size:12.5px;padding:3px 0;}
  .row .k{width:78px;flex:none;color:var(--ink-2);white-space:nowrap;}
  .row .v{color:var(--ink);}
  .deal{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:7px 0;border-bottom:1px dashed var(--line);}
  .deal:last-child{border-bottom:none;}
  .deal .yr{margin-left:auto;color:var(--ink-2);font-size:11px;}
  .deal .occ{color:var(--ink-2);}
  .nas{font-size:11.5px;background:var(--bg-soft);border:1px solid var(--line);border-radius:6px;padding:9px 11px;color:var(--ink);font-family:"Mulish",monospace;word-break:break-all;display:flex;align-items:center;gap:8px;}
  .nas .copy{margin-left:auto;flex:none;border:1px solid var(--line);background:var(--bg);border-radius:5px;font-size:10.5px;padding:3px 8px;color:var(--ink-2);}
  .nas .copy:hover{background:var(--hover);color:var(--ink);}
  .slidelink{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink);text-decoration:none;border:1px solid var(--line);border-radius:6px;padding:8px 12px;margin-top:8px;}
  .slidelink:hover{background:var(--hover);}
  .note-illus{font-size:10.5px;color:#bcbcbc;margin-top:10px;line-height:1.5;}
  .pill{display:inline-flex;gap:6px;flex-wrap:wrap;}
  .pill span{font-size:11px;border:1px solid var(--line);border-radius:20px;padding:2px 9px;color:var(--ink-2);}
</style>

<!-- ============================================================
     資料來源：Google Sheet (gviz/tq — 不需發布到網路)
     欄位：name, price, priceNote, moq, material, tag,
           industries, themes, nas_path, slide_url, image_url, deals
     ============================================================ -->
<script>
window.COZU_MATERIAL_RULES = [
  ["玻璃",    /玻璃|香檳杯|咖啡杯|啤酒杯/],
  ["壓克力",  /壓克力/],
  ["PP",      /PP/],
  ["布料織品", /布料|毛巾布|繩/],
  ["石材水泥", /冰磚|石粉|石膏|水泥|擴香石|天然石/],
  ["泰維克",  /泰維克/],
  ["NFC",     /NFC/]
];
window.COZU_MATERIAL_OPTIONS = ["玻璃","壓克力","布料織品","石材水泥","PP","泰維克","NFC"];
window.COZU_THEME_OPTIONS    = ["週年慶","員工福利","節慶送禮","尾牙","新品上市","開幕活動"];
window.COZU_INDUSTRY_OPTIONS = ["科技","金融","醫療","零售","餐飲","政府機關","其他"];
window.COZU_TAG_OPTIONS      = ["人氣","實用","科技感","環保"];

window.cozuMaterials = function(materialText){
  return window.COZU_MATERIAL_RULES.filter(([,re]) => re.test(materialText)).map(([k]) => k);
};

window.cozuDealRecords = function(g){
  if (!g.deals) return [];
  return g.deals.trim().split("\n")
    .map(line => line.trim()).filter(Boolean)
    .map(line => {
      const [company, occasion, year] = line.split("|");
      return { company: company||"", occasion: occasion||"", year: year||"" };
    });
};

window.COZU_GIFTS = [];
window.COZU_DATA_READY = false;

(async function loadSheet(){
  const SHEET_ID = "1ElYuyhmYM7GGUIdx1h93AiIqSISDbzaO15CN_goIx9A";
  // gid=0 代表第一張工作表，不受工作表名稱影響
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=0`;

  try {
    const res  = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    // gviz 回傳格式：/*O_o*/\ngoogle.visualization.Query.setResponse({...});
    // 要把前後包裝剝掉才能 JSON.parse
    const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
    if (!match) throw new Error("gviz 回傳格式非預期：" + text.slice(0, 100));
    const json = JSON.parse(match[1]);
    const cols = json.table.cols.map(c => c.label);
    const rows = json.table.rows;

    window.COZU_GIFTS = rows.map(row => {
      const get = (key) => {
        const i = cols.indexOf(key);
        return (i >= 0 && row.c[i]) ? String(row.c[i].v).trim() : '';
      };
      return {
        name      : get("name"),
        price     : parseFloat(get("price")) || 0,
        priceNote : get("priceNote"),
        moq       : parseInt(get("moq"))   || 0,
        material  : get("material"),
        tag       : get("tag"),
        industries: get("industries").split(",").map(s=>s.trim()).filter(Boolean),
        themes    : get("themes").split(",").map(s=>s.trim()).filter(Boolean),
        nas_path  : get("nas_path"),
        slide_url : get("slide_url"),
        image_url : get("image_url"),
        deals     : get("deals"),
      };
    }).filter(p => p.name);

    window.COZU_DATA_READY = true;
    window.dispatchEvent(new Event("cozu:ready"));
  } catch(e) {
    console.error("Google Sheet 載入失敗", e);
    window.dispatchEvent(new CustomEvent("cozu:error", {detail: e.message}));
  }
})();
</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"

);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

                <div className="nas">
                  <span>{nas}</span>
                  <button className="copy" onClick={() => { navigator.clipboard?.writeText(nas); setCopied(true); setTimeout(()=>setCopied(false),1200); }}>{copied ? "已複製" : "複製"}</button>
                </div>
                <a className="slidelink" href={g.slide_url || "#"} target={g.slide_url ? "_blank" : "_self"} rel="noopener noreferrer" onClick={!g.slide_url ? e=>e.preventDefault() : undefined}>
                  <IcoBox width="15" height="15" /> 開啟過往提案簡報（雲端）
                </a>
                <p className="note-illus">成交紀錄、NAS 路徑與簡報連結為 lo-fi 階段示意資料，正式版將連動 Google Sheet 對應欄位。</p>
              </div>
            </div>
      </aside>
    </>
  );
}

/* ---------- app ---------- */
function toggleIn(set, v) { const n = new Set(set); n.has(v) ? n.delete(v) : n.add(v); return n; }

function LoadingScreen() {
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",
                 height:"60vh",flexDirection:"column",gap:"12px",color:"var(--ink-2)"}}>
      <div style={{fontSize:"13px"}}>正在從 Google Sheet 載入商品資料⋯</div>
    </div>
  );
}
function ErrorScreen({msg}) {
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",
                 height:"60vh",flexDirection:"column",gap:"12px",color:"#c0392b"}}>
      <div style={{fontSize:"14px",fontWeight:700}}>資料載入失敗</div>
      <div style={{fontSize:"12px",color:"var(--ink-2)"}}>{msg}</div>
      <div style={{fontSize:"11px",color:"var(--ink-2)"}}>請確認 Google Sheet 已設為「發布到網路」</div>
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [dataReady, setDataReady] = useState(window.COZU_DATA_READY || false);
  const [dataError, setDataError] = useState(null);
  const [entry, setEntry] = useState("gift");
  const [mats, setMats] = useState(new Set());
  const [themes, setThemes] = useState(new Set());
  const [inds, setInds] = useState(new Set());
  const [tags, setTags] = useState(new Set());
  const [budget, setBudget] = useState("all");
  const [moq, setMoq] = useState("all");
  const [open, setOpen] = useState(null);

  React.useEffect(() => {
    if (window.COZU_DATA_READY) { setDataReady(true); return; }
    const onReady = () => setDataReady(true);
    const onError = (e) => setDataError(e.detail || "未知錯誤");
    window.addEventListener("cozu:ready", onReady);
    window.addEventListener("cozu:error", onError);
    return () => {
      window.removeEventListener("cozu:ready", onReady);
      window.removeEventListener("cozu:error", onError);
    };
  }, []);

  if (dataError) return <ErrorScreen msg={dataError} />;
  if (!dataReady) return <LoadingScreen />;

  const all = window.COZU_GIFTS;

  const counts = useMemo(() => {
    const c = { mat:{}, theme:{}, ind:{}, tag:{} };
    all.forEach(g => {
      window.cozuMaterials(g.material).forEach(m => c.mat[m] = (c.mat[m]||0)+1);
      g.themes.forEach(x => c.theme[x] = (c.theme[x]||0)+1);
      g.industries.forEach(x => c.ind[x] = (c.ind[x]||0)+1);
      c.tag[g.tag] = (c.tag[g.tag]||0)+1;
    });
    return c;
  }, [all]);

  const results = useMemo(() => {
    const bt = BUDGETS.find(b => b.id === budget).test;
    const mmax = MOQS.find(m => m.id === moq).max;
    return all.filter(g => {
      if (mats.size && !window.cozuMaterials(g.material).some(m => mats.has(m))) return false;
      if (themes.size && !g.themes.some(x => themes.has(x))) return false;
      if (inds.size && !g.industries.some(x => inds.has(x))) return false;
      if (tags.size && !tags.has(g.tag)) return false;
      if (!bt(g.price)) return false;
      if (g.moq > mmax) return false;
      return true;
    });
  }, [all, mats, themes, inds, tags, budget, moq]);

  const activeCount = mats.size + themes.size + inds.size + tags.size + (budget!=="all"?1:0) + (moq!=="all"?1:0);
  const clearAll = () => { setMats(new Set()); setThemes(new Set()); setInds(new Set()); setTags(new Set()); setBudget("all"); setMoq("all"); };

  // active filter chips
  const activeChips = [];
  mats.forEach(m => activeChips.push({ k:"材質:"+m, rm:()=>setMats(toggleIn(mats,m)) }));
  themes.forEach(m => activeChips.push({ k:"場合:"+m, rm:()=>setThemes(toggleIn(themes,m)) }));
  inds.forEach(m => activeChips.push({ k:"產業:"+m, rm:()=>setInds(toggleIn(inds,m)) }));
  tags.forEach(m => activeChips.push({ k:"風格:"+m, rm:()=>setTags(toggleIn(tags,m)) }));
  if (budget!=="all") activeChips.push({ k:BUDGETS.find(b=>b.id===budget).label, rm:()=>setBudget("all") });
  if (moq!=="all") activeChips.push({ k:"MOQ "+MOQS.find(m=>m.id===moq).label, rm:()=>setMoq("all") });

  return (
    <>
      <div className="topbar">
        <div className="wrap">
          <div className="topbar-inner">
            <div className="brand"><b>COZU</b><span>禮贈品查詢系統</span></div>
            <div className="topbar-meta">內部工具 · 資料來源 Google Sheet</div>
          </div>
          <div className="tabs">
            <button className={"tab" + (entry==="gift"?" active":"")} onClick={()=>setEntry("gift")}>
              <IcoGift className="ico" /> 禮贈商品
            </button>
            <button className="tab disabled"><IcoBox className="ico" /> 禮盒 <span className="soon">開發中</span></button>
            <button className="tab disabled"><IcoTrophy className="ico" /> 獎座 <span className="soon">開發中</span></button>
          </div>
        </div>
      </div>

      <div className="wrap">
        <div className="layout">
          {/* rail */}
          <div className="rail">
            <div className="rail-head">
              <h2>篩選條件</h2>
              <button className="clear-btn" onClick={clearAll} disabled={activeCount===0}>清除篩選</button>
            </div>
            <CheckGroup title="材質" options={window.COZU_MATERIAL_OPTIONS} sel={mats} counts={counts.mat} onToggle={v=>setMats(toggleIn(mats,v))} />
            <ChipGroup title="預算" options={BUDGETS} value={budget} onPick={setBudget} />
            <ChipGroup title="最低訂購量 MOQ" options={MOQS} value={moq} onPick={setMoq} />
            <CheckGroup title="場合" options={window.COZU_THEME_OPTIONS} sel={themes} counts={counts.theme} onToggle={v=>setThemes(toggleIn(themes,v))} />
            <CheckGroup title="適合產業" options={window.COZU_INDUSTRY_OPTIONS} sel={inds} counts={counts.ind} onToggle={v=>setInds(toggleIn(inds,v))} />
            <CheckGroup title="風格標籤" options={window.COZU_TAG_OPTIONS} sel={tags} counts={counts.tag} onToggle={v=>setTags(toggleIn(tags,v))} />
          </div>

          {/* results */}
          <div className="content">
            <div className="res-head">
              <span className="res-count">找到 <b>{results.length}</b> 項商品</span>
              <div className="active-chips">
                {activeChips.map(c => (
                  <span className="achip" key={c.k}>{c.k}<button onClick={c.rm}>×</button></span>
                ))}
              </div>
            </div>

            {results.length === 0 ? (
              <div className="empty">
                <h4>沒有符合條件的商品</h4>
                <p>試著放寬預算、材質或場合條件。</p>
                <button onClick={clearAll}>清除所有篩選</button>
              </div>
            ) : (
              <div className="grid" style={{ "--cols": t.cols }}>
                {results.map(g => <Card key={g.name} g={g} t={t} onOpen={setOpen} />)}
              </div>
            )}
          </div>
        </div>
      </div>

      <Peek g={open} onClose={()=>setOpen(null)} />

      <TweaksPanel>
        <TweakSection label="卡片顯示" />
        <TweakRadio label="圖片比例" value={t.ratio} options={["4:3","1:1"]} onChange={v=>setTweak("ratio",v)} />
        <TweakRadio label="每列卡片數" value={String(t.cols)} options={["2","3","4"]} onChange={v=>setTweak("cols",Number(v))} />
        <TweakToggle label="顯示產品圖片" value={t.showImage} onChange={v=>setTweak("showImage",v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
