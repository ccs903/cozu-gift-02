<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>COZU 禮贈品查詢系統 v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #ffffff;
  --bg-soft: #f7f7f7;
  --ink: #1a1a1a;
  --ink-2: #888888;
  --line: #e5e5e5;
  --hover: #f0f0f0;
  --radius: 7px;
  --rail: 220px;
  --font: "Mulish","Noto Sans TC",-apple-system,BlinkMacSystemFont,sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.55;
  color: var(--ink);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; }
a { color: inherit; text-decoration: none; }

/* ── Topbar ── */
.topbar {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
}
.topbar-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 28px;
}
.topbar-row1 {
  display: flex;
  align-items: center;
  height: 52px;
  gap: 12px;
}
.brand { display: flex; align-items: baseline; gap: 8px; }
.brand-name { font-size: 15px; font-weight: 700; letter-spacing: .01em; }
.brand-sub { font-size: 11px; color: var(--ink-2); }
.topbar-right { margin-left: auto; font-size: 11px; color: var(--ink-2); }

/* ── Tabs ── */
.tabs { display: flex; gap: 2px; }
.tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 9px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-2);
  background: none;
  border: 1px solid transparent;
  border-bottom: none;
  border-radius: var(--radius) var(--radius) 0 0;
  position: relative;
  top: 1px;
  white-space: nowrap;
}
.tab svg { width: 14px; height: 14px; }
.tab.active { color: var(--ink); background: var(--bg); border-color: var(--line); }
.tab.disabled { color: #ccc; cursor: default; }
.tab:not(.active):not(.disabled):hover { background: var(--hover); }
.soon {
  font-size: 9px;
  color: #bbb;
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 1px 5px;
}

/* ── Shell ── */
.shell {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 28px 80px;
  display: grid;
  grid-template-columns: var(--rail) 1fr;
  gap: 32px;
  align-items: start;
}

/* ── Rail ── */
.rail {
  position: sticky;
  top: 106px;
  padding: 24px 0;
}
.rail-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.rail-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--ink-2);
}
.clear-btn {
  font-size: 11px;
  color: var(--ink-2);
  background: none;
  border: none;
  padding: 2px 4px;
  border-radius: 4px;
}
.clear-btn:hover:not(:disabled) { color: var(--ink); background: var(--hover); }
.clear-btn:disabled { opacity: .35; cursor: default; }

.fgroup { padding: 13px 0; border-top: 1px solid var(--line); }
.fgroup-title { font-size: 12px; font-weight: 700; margin-bottom: 8px; }

/* checkbox options */
.opt {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 3px 0;
  font-size: 12px;
  cursor: pointer;
  user-select: none;
}
.opt:hover .box { border-color: var(--ink); }
.box {
  width: 14px;
  height: 14px;
  border: 1px solid #c8c8c8;
  border-radius: 3px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.opt.on .box { background: var(--ink); border-color: var(--ink); }
.opt.on .box::after {
  content: '';
  display: block;
  width: 7px;
  height: 4px;
  border-left: 1.5px solid #fff;
  border-bottom: 1.5px solid #fff;
  transform: rotate(-45deg) translate(0px, -1px);
}
.opt-cnt { margin-left: auto; font-size: 10px; color: #bbb; }

/* chip options */
.chips { display: flex; flex-wrap: wrap; gap: 5px; }
.chip {
  font-size: 11px;
  padding: 3px 10px;
  border: 1px solid var(--line);
  border-radius: 20px;
  background: var(--bg);
  color: var(--ink);
  white-space: nowrap;
}
.chip:hover { background: var(--hover); }
.chip.on { background: var(--ink); color: #fff; border-color: var(--ink); }

/* ── Content ── */
.content { padding: 24px 0; }

.res-bar {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 18px;
  min-height: 28px;
}
.res-count { font-size: 13px; color: var(--ink); white-space: nowrap; }
.res-count b { font-weight: 700; }
.active-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.achip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--ink-2);
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 2px 4px 2px 8px;
  white-space: nowrap;
}
.achip button {
  border: none;
  background: none;
  color: #bbb;
  font-size: 13px;
  line-height: 1;
  padding: 0 2px;
  border-radius: 50%;
}
.achip button:hover { color: var(--ink); }

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
@media (max-width: 1100px) { .grid { grid-template-columns: repeat(2, 1fr); } }

/* ── Card ── */
.card {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--bg);
  overflow: hidden;
  cursor: pointer;
  text-align: left;
  transition: border-color .1s, background .1s;
  display: flex;
  flex-direction: column;
}
.card:hover { background: var(--bg-soft); border-color: #d0d0d0; }

.card-img {
  aspect-ratio: 4/3;
  background: var(--bg-soft);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.card-img img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.ph-cross {
  position: absolute;
  inset: 0;
}
.ph-cross line { stroke: #e2e2e2; stroke-width: 1; }
.ph-label {
  position: relative;
  font-size: 10px;
  color: #bbb;
  letter-spacing: .04em;
}

.card-body { padding: 12px 13px 13px; flex: 1; display: flex; flex-direction: column; }
.card-name-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; }
.card-name { font-size: 14px; font-weight: 600; line-height: 1.35; }
.card-name-mats { display: flex; gap: 3px; flex-wrap: wrap; align-items: center; }
.card-price { margin-bottom: 9px; }
.card-price-row { display: flex; align-items: baseline; gap: 8px; }
.card-price-main { font-size: 13px; font-weight: 700; }
.card-price-min { font-size: 10px; font-weight: 700; color: var(--ink-2); }
.card-price-note { font-size: 10px; font-weight: 400; color: var(--ink-2); margin-top: 2px; line-height: 1.4; }
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.mtag {
  font-size: 10px;
  color: var(--ink-2);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 1px 6px;
  white-space: nowrap;
}
.mtag-mat { background: #232A31; color: #fff; border-color: #232A31; }
.card-meta {
  font-size: 11px;
  color: var(--ink-2);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.meta-sep { color: var(--line); }
.card-tag-row {
  margin-top: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.deal-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 10px;
  color: var(--ink-2);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 1px 6px;
}
.deal-badge svg { width: 9px; height: 9px; }

/* ── Empty / Error ── */
.empty {
  border: 1px dashed var(--line);
  border-radius: 10px;
  padding: 60px 24px;
  text-align: center;
  color: var(--ink-2);
}
.empty h4 { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
.empty p { font-size: 12px; margin-bottom: 16px; }
.empty-btn {
  border: 1px solid var(--line);
  background: var(--bg);
  border-radius: 6px;
  padding: 7px 16px;
  font-size: 12px;
}
.empty-btn:hover { background: var(--hover); }

.error {
  text-align: center;
  padding: 60px 24px;
  color: var(--ink-2);
}
.error-title { font-size: 14px; font-weight: 700; color: #c0392b; margin-bottom: 6px; }
.error-msg { font-size: 11px; }

.loading {
  text-align: center;
  padding: 80px 24px;
  color: var(--ink-2);
  font-size: 13px;
}
.spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 1px solid var(--line);
  border-top-color: var(--ink);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Slide-over ── */
.scrim {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.15);
  z-index: 40;
  animation: fadeIn .15s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.peek {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 420px;
  max-width: 92vw;
  background: var(--bg);
  border-left: 1px solid var(--line);
  z-index: 50;
  display: flex;
  flex-direction: column;
  animation: slideIn .2s ease;
}
@keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

.peek-head {
  display: flex;
  align-items: center;
  padding: 13px 16px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.peek-label { font-size: 11px; color: var(--ink-2); letter-spacing: .04em; }
.peek-close {
  margin-left: auto;
  width: 28px; height: 28px;
  border: none;
  background: none;
  color: var(--ink-2);
  font-size: 16px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.peek-close:hover { background: var(--hover); color: var(--ink); }

.peek-body { overflow-y: auto; padding: 18px; flex: 1; }

.peek-img {
  aspect-ratio: 4/3;
  background: var(--bg-soft);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.peek-img img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: var(--radius);
}

.peek-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.peek-price { margin-bottom: 2px; }
.peek-price-row { display: flex; align-items: baseline; gap: 8px; }
.peek-price-main { font-size: 15px; font-weight: 700; }
.peek-price-min { font-size: 11px; font-weight: 700; color: var(--ink-2); }
.peek-price-note { font-size: 11px; font-weight: 400; color: var(--ink-2); margin-top: 3px; line-height: 1.5; }

.dl { margin-top: 18px; border-top: 1px solid var(--line); padding-top: 14px; }
.dl-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--ink-2);
  margin-bottom: 10px;
}
.dl-row { display: flex; gap: 12px; font-size: 12px; padding: 3px 0; }
.dl-key { width: 80px; flex-shrink: 0; color: var(--ink-2); }
.dl-val { color: var(--ink); flex: 1; }

.pills { display: flex; flex-wrap: wrap; gap: 4px; }
.pill {
  font-size: 10px;
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 2px 8px;
  color: var(--ink-2);
}

/* deals */
.deal-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  padding: 8px;
  border-bottom: 1px dashed var(--line);
}
.deal-row:last-child { border-bottom: none; }
.deal-co { font-weight: 500; color: var(--ink); }
.deal-occ { color: var(--ink-2); }
.deal-yr { margin-left: auto; font-size: 10px; color: var(--ink-2); white-space: nowrap; }
.deal-selected-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 10px;
  font-weight: 600;
  color: #2d7a3a;
  white-space: nowrap;
}
.deal-empty { font-size: 12px; color: #bbb; padding: 6px 0; }

/* card proposal meta */
.meta-selected {
  color: var(--ink);
  font-weight: 600;
}
.meta-selected-check {
  font-size: 11px;
}

/* NAS */
.nas-box {
  background: var(--bg-soft);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 9px 11px;
  font-size: 11px;
  color: var(--ink);
  font-family: "Mulish", monospace;
  word-break: break-all;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.nas-path { flex: 1; }
.copy-btn {
  flex-shrink: 0;
  border: 1px solid var(--line);
  background: var(--bg);
  border-radius: 5px;
  font-size: 10px;
  padding: 3px 8px;
  color: var(--ink-2);
}
.copy-btn:hover { background: var(--hover); color: var(--ink); }

.slide-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 8px 12px;
  margin-top: 8px;
  color: var(--ink);
}
.slide-link:hover { background: var(--hover); }
.slide-link svg { width: 13px; height: 13px; }

.peek-note {
  font-size: 10px;
  color: #bbb;
  margin-top: 10px;
  line-height: 1.5;
}

/* coming soon */
.soon-panel {
  border: 1px dashed var(--line);
  border-radius: 10px;
  padding: 80px 24px;
  text-align: center;
  color: var(--ink-2);
}
.soon-panel h4 { font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
.soon-panel p { font-size: 12px; }
</style>
</head>
<body>

<!-- ════════ TOPBAR ════════ -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="topbar-row1">
      <div class="brand">
        <span class="brand-name">COZU</span>
        <span class="brand-sub">禮贈品查詢系統</span>
      </div>
      <div class="topbar-right" id="lastUpdated"></div>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="gift" onclick="switchTab('gift')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 12v9H4v-9"/><path d="M2 7h20v5H2z"/><path d="M12 22V7"/>
          <path d="M12 7S11 3 8.5 3 5 5 5 5s.5 2 3 2"/><path d="M12 7s1-4 3.5-4S19 5 19 5s-.5 2-3 2"/>
        </svg>
        禮贈商品
      </button>
      <button class="tab disabled">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 8 12 3 3 8v8l9 5 9-5z"/><path d="M3 8l9 5 9-5M12 13v8"/>
        </svg>
        禮盒 <span class="soon">開發中</span>
      </button>
      <button class="tab disabled">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 0 1-10 0z"/>
          <path d="M7 5H4v2a3 3 0 0 0 3 3M17 5h3v2a3 3 0 0 1-3 3"/>
        </svg>
        獎座 <span class="soon">開發中</span>
      </button>
    </div>
  </div>
</div>

<!-- ════════ SHELL ════════ -->
<div class="shell">

  <!-- ── Rail ── -->
  <aside class="rail" id="railGift">
    <div class="rail-head">
      <span class="rail-title">篩選條件</span>
      <button class="clear-btn" id="clearBtn" onclick="clearAll()" disabled>清除篩選</button>
    </div>

    <!-- 材質 -->
    <div class="fgroup">
      <div class="fgroup-title">材質</div>
      <div id="matOpts"></div>
    </div>

    <!-- 預算 -->
    <div class="fgroup">
      <div class="fgroup-title">單品預算</div>
      <div class="chips" id="budgetChips">
        <button class="chip on" data-budget="all" onclick="pickBudget('all')">不限</button>
        <button class="chip" data-budget="u150" onclick="pickBudget('u150')">NT$150 以下</button>
        <button class="chip" data-budget="150-300" onclick="pickBudget('150-300')">NT$150–300</button>
        <button class="chip" data-budget="300-500" onclick="pickBudget('300-500')">NT$300–500</button>
        <button class="chip" data-budget="o500" onclick="pickBudget('o500')">NT$500 以上</button>
      </div>
    </div>

    <!-- MOQ -->
    <div class="fgroup">
      <div class="fgroup-title">最低訂購量 MOQ</div>
      <div class="chips" id="moqChips">
        <button class="chip on" data-moq="all" onclick="pickMoq('all')">不限</button>
        <button class="chip" data-moq="100" onclick="pickMoq('100')">≤ 100</button>
        <button class="chip" data-moq="300" onclick="pickMoq('300')">≤ 300</button>
        <button class="chip" data-moq="500" onclick="pickMoq('500')">≤ 500</button>
        <button class="chip" data-moq="1000" onclick="pickMoq('1000')">≤ 1000</button>
      </div>
    </div>

    <!-- 場合 -->
    <div class="fgroup">
      <div class="fgroup-title">場合</div>
      <div id="themeOpts"></div>
    </div>

    <!-- 適合產業 -->
    <div class="fgroup">
      <div class="fgroup-title">適合產業</div>
      <div id="indOpts"></div>
    </div>

    <!-- 風格 -->
    <div class="fgroup">
      <div class="fgroup-title">標籤</div>
      <div id="tagOpts"></div>
    </div>
  </aside>

  <!-- ── Content ── -->
  <main class="content" id="contentGift">

    <!-- res bar -->
    <div class="res-bar">
      <span class="res-count" id="resCount"></span>
      <div class="active-chips" id="activeChips"></div>
    </div>

    <!-- states -->
    <div class="loading" id="stateLoading">
      <span class="spinner"></span>正在載入商品資料…
    </div>
    <div class="error" id="stateError" style="display:none">
      <div class="error-title">資料載入失敗</div>
      <div class="error-msg" id="errorMsg">請確認是否已登入公司 Google 帳號，或聯繫管理員確認試算表權限。</div>
    </div>
    <div class="grid" id="cardGrid" style="display:none"></div>
    <div class="empty" id="stateEmpty" style="display:none">
      <h4>沒有符合條件的商品</h4>
      <p>試著放寬預算、材質或場合條件。</p>
      <button class="empty-btn" onclick="clearAll()">清除所有篩選</button>
    </div>

  </main>
</div>

<!-- ════════ SLIDE-OVER ════════ -->
<div class="scrim" id="scrim" style="display:none" onclick="closePeek()"></div>
<aside class="peek" id="peek" style="display:none">
  <div class="peek-head">
    <span class="peek-label">商品明細</span>
    <button class="peek-close" onclick="closePeek()">✕</button>
  </div>
  <div class="peek-body" id="peekBody"></div>
</aside>

<script>
// ════════════════════════════════════
// 設定
// ════════════════════════════════════
const SHEET_ID   = '1ElYuyhmYM7GGUIdx1h93AiIqSISDbzaO15CN_goIx9A';
const SHEET_GID  = '0'; // 第一張工作表

// 材質對應規則
const MAT_RULES = [
  ['玻璃',    /玻璃|香檳杯|咖啡杯|啤酒杯/],
  ['壓克力',  /壓克力/],
  ['PP',      /PP/],
  ['布料織品', /布料|毛巾布|繩/],
  ['石材水泥', /冰磚|石粉|石膏|水泥|擴香石|天然石/],
  ['泰維克',  /泰維克/],
  ['NFC',     /NFC/],
];

// 預算篩選：price_min ≤ 上限 → 偏寬鬆，讓業務靠 priceNote 自行判斷
const BUDGET_OPTS = [
  { id: 'all',     label: '不限',        maxPrice: Infinity, minPrice: 0 },
  { id: 'u150',    label: 'NT$150 以下', maxPrice: 150,      minPrice: 0 },
  { id: '150-300', label: 'NT$150–300',  maxPrice: 300,      minPrice: 150 },
  { id: '300-500', label: 'NT$300–500',  maxPrice: 500,      minPrice: 300 },
  { id: 'o500',    label: 'NT$500 以上', maxPrice: Infinity, minPrice: 500 },
];
const MOQ_OPTS = [
  { id: 'all',  label: '不限',   max: Infinity },
  { id: '100',  label: '≤ 100',  max: 100 },
  { id: '300',  label: '≤ 300',  max: 300 },
  { id: '500',  label: '≤ 500', max: 500 },
  { id: '1000', label: '≤ 1000', max: 1000 },
];

// ════════════════════════════════════
// 狀態
// ════════════════════════════════════
let products = [];
let selMats   = new Set();
let selThemes = new Set();
let selInds   = new Set();
let selTags   = new Set();
let selBudget = 'all';
let selMoq    = 'all';

// ════════════════════════════════════
// 載入資料
// ════════════════════════════════════
async function loadData() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET_GID}`;
  try {
    const res  = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const m    = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
    if (!m) {
      // fallback：舊格式
      const raw = text.replace(/^[^{]*/, '').replace(/[^}]*$/, '');
      return parseGviz(JSON.parse(raw));
    }
    return parseGviz(JSON.parse(m[1]));
  } catch (e) {
    throw e;
  }
}

function parseGviz(json) {
  const cols = json.table.cols.map(c => c.label);
  const rows = json.table.rows;
  return rows.map(row => {
    const get = k => {
      const i = cols.indexOf(k);
      return (i >= 0 && row.c[i]) ? String(row.c[i].v).trim() : '';
    };
    // proposals: 格式「公司名稱|場合|年份|selected（可空）|簡報URL（可空）」
    // 第四欄若不是 'selected' 則視為 URL（兼容沒有補空欄的資料）
    const proposalsRaw = get('proposals');
    const proposals = proposalsRaw
      ? proposalsRaw.trim().split('\n').map(l => {
          const parts    = l.trim().split('|');
          const company  = (parts[0] || '').trim();
          const occasion = (parts[1] || '').trim();
          const year     = (parts[2] || '').trim();
          const col3     = (parts[3] || '').trim();
          const col4     = (parts[4] || '').trim();
          const isSelected = col3.toLowerCase() === 'selected';
          const selected   = isSelected;
          const slide_url  = isSelected ? col4 : col3;
          return { company, occasion, year, selected, slide_url };
        }).filter(d => d.company)
        .sort((a, b) => {
          if (a.selected !== b.selected) return a.selected ? -1 : 1;
          return parseInt(b.year) - parseInt(a.year);
        })
      : [];

    const priceMax = parseFloat(get('price_max')) || parseFloat(get('price')) || 0;
    const priceMin = parseFloat(get('price_min')) || priceMax;
    return {
      name      : get('name'),
      price     : priceMax,
      price_max : priceMax,
      price_min : priceMin,
      priceNote : get('priceNote'),
      moq       : parseInt(get('moq')) || 0,
      material  : get('material'),
      tag       : get('tag'),
      industries: get('industries').split(',').map(s => s.trim()).filter(Boolean),
      themes    : get('themes').split(',').map(s => s.trim()).filter(Boolean),
      nas_path  : get('nas_path'),
      image_url : get('image_url'),
      last_updated_time: parseGvizDate(get('last_updated_time')),
      proposals,
    };
  }).filter(p => p.name);
}

function getMats(material) {
  return MAT_RULES.filter(([, re]) => re.test(material)).map(([k]) => k);
}

// gviz 日期格式轉換：Date(2026,5,29,14,53,0) → 2026/6/29 14:53
function parseGvizDate(val) {
  if (!val) return '';
  const m = String(val).match(/Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+))?/);
  if (m) {
    const year  = m[1];
    const month = parseInt(m[2]) + 1; // gviz 月份從 0 開始
    const day   = m[3];
    const hour  = m[4] != null ? String(m[4]).padStart(2,'0') : null;
    const min   = m[5] != null ? String(m[5]).padStart(2,'0') : null;
    return hour ? `${year}/${month}/${day} ${hour}:${min}` : `${year}/${month}/${day}`;
  }
  return val; // 如果已經是純文字就直接回傳
}

// ════════════════════════════════════
// 篩選邏輯
// ════════════════════════════════════
// price_min ≤ 上限：大量時有機會壓到預算 → 偏寬鬆，業務靠 priceNote 自判
// NT$500以上：price_max ≥ 500，確保高單價商品能被找到
function matchBudget(p) {
  const opt = BUDGET_OPTS.find(b => b.id === selBudget);
  if (opt.id === 'all')  return true;
  if (opt.id === 'o500') return p.price_max >= 500;
  return p.price_min <= opt.maxPrice;
}
function matchMoq(moq) {
  return moq <= MOQ_OPTS.find(m => m.id === selMoq).max;
}
function getFiltered() {
  return products.filter(p => {
    if (selMats.size   && !getMats(p.material).some(m => selMats.has(m)))   return false;
    if (selThemes.size && !p.themes.some(t => selThemes.has(t)))            return false;
    if (selInds.size   && !p.industries.some(i => selInds.has(i)))          return false;
    if (selTags.size   && !selTags.has(p.tag))                              return false;
    if (!matchBudget(p))                                                    return false;
    if (!matchMoq(p.moq))                                                   return false;
    return true;
  });
}

// ════════════════════════════════════
// 動態計算 counts（只算目前篩選下的）
// ════════════════════════════════════
function computeCounts() {
  const c = { mat: {}, theme: {}, ind: {}, tag: {} };
  products.forEach(p => {
    getMats(p.material).forEach(m => c.mat[m] = (c.mat[m] || 0) + 1);
    p.themes.forEach(t => c.theme[t] = (c.theme[t] || 0) + 1);
    p.industries.forEach(i => c.ind[i] = (c.ind[i] || 0) + 1);
    if (p.tag) c.tag[p.tag] = (c.tag[p.tag] || 0) + 1;
  });
  return c;
}

// ════════════════════════════════════
// 建立 rail 選項
// ════════════════════════════════════
const ALL_MATS  = ['玻璃','壓克力','布料織品','石材水泥','PP','泰維克','NFC'];
const ALL_THEMES = ['週年慶','員工福利','節慶送禮','尾牙','新品上市','開幕活動'];
const ALL_INDS  = ['科技','金融','醫療','零售','餐飲','政府機關','其他'];
const ALL_TAGS  = ['熱銷','實用','科技感','環保'];

function buildCheckGroup(containerId, options, selSet, counts, onToggle) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  options.forEach(opt => {
    const on  = selSet.has(opt);
    const cnt = counts[opt] || 0;
    const div = document.createElement('div');
    div.className = 'opt' + (on ? ' on' : '');
    div.innerHTML = `<span class="box"></span><span>${opt}</span><span class="opt-cnt">${cnt}</span>`;
    div.addEventListener('click', () => onToggle(opt));
    el.appendChild(div);
  });
}

function buildChipGroup(containerId, options, selSet, onToggle) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (selSet.has(opt) ? ' on' : '');
    btn.textContent = opt;
    btn.addEventListener('click', () => onToggle(opt));
    el.appendChild(btn);
  });
}

function buildRail() {
  const counts = computeCounts();
  buildCheckGroup('matOpts',   ALL_MATS,   selMats,   counts.mat,   v => toggle(selMats, v, render));
  buildCheckGroup('themeOpts', ALL_THEMES, selThemes, counts.theme, v => toggle(selThemes, v, render));
  buildCheckGroup('indOpts',   ALL_INDS,   selInds,   counts.ind,   v => toggle(selInds, v, render));
  buildCheckGroup('tagOpts',   ALL_TAGS,   selTags,   counts.tag,   v => toggle(selTags, v, render));
}

function toggle(set, val, cb) {
  set.has(val) ? set.delete(val) : set.add(val);
  cb();
}

// ════════════════════════════════════
// Chip filters
// ════════════════════════════════════
function pickBudget(id) {
  selBudget = id;
  document.querySelectorAll('#budgetChips .chip').forEach(b => {
    b.classList.toggle('on', b.dataset.budget === id);
  });
  render();
}
function pickMoq(id) {
  selMoq = id;
  document.querySelectorAll('#moqChips .chip').forEach(b => {
    b.classList.toggle('on', b.dataset.moq === id);
  });
  render();
}

// ════════════════════════════════════
// Render
// ════════════════════════════════════
function render() {
  buildRail();
  const filtered = getFiltered();
  const hasFilter = selMats.size || selThemes.size || selInds.size || selTags.size || selBudget !== 'all' || selMoq !== 'all';

  document.getElementById('clearBtn').disabled = !hasFilter;
  document.getElementById('resCount').innerHTML = `找到 <b>${filtered.length}</b> 項商品`;

  // active chips
  const achip = document.getElementById('activeChips');
  achip.innerHTML = '';
  const addChip = (label, rm) => {
    const s = document.createElement('span');
    s.className = 'achip';
    s.innerHTML = `${label}<button>×</button>`;
    s.querySelector('button').addEventListener('click', rm);
    achip.appendChild(s);
  };
  selMats.forEach(m  => addChip('材質：' + m,  () => toggle(selMats,   m, render)));
  selThemes.forEach(t => addChip('場合：' + t, () => toggle(selThemes, t, render)));
  selInds.forEach(i  => addChip('產業：' + i,  () => toggle(selInds,   i, render)));
  selTags.forEach(t  => addChip('風格：' + t,  () => toggle(selTags,   t, render)));
  if (selBudget !== 'all') addChip(BUDGET_OPTS.find(b => b.id === selBudget).label, () => pickBudget('all'));
  if (selMoq    !== 'all') addChip('MOQ ' + MOQ_OPTS.find(m => m.id === selMoq).label, () => pickMoq('all'));

  // cards
  const grid  = document.getElementById('cardGrid');
  const empty = document.getElementById('stateEmpty');

  if (filtered.length === 0) {
    grid.style.display  = 'none';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.style.display  = 'grid';
  grid.innerHTML = '';

  filtered.forEach(p => {
    const mats  = getMats(p.material);
    const card  = document.createElement('button');
    card.className = 'card';
    card.addEventListener('click', () => openPeek(p));

    const imgHtml = p.image_url
      ? `<img src="${p.image_url}" alt="${p.name}" />`
      : `<svg class="ph-cross" viewBox="0 0 100 100" preserveAspectRatio="none"><line x1="0" y1="0" x2="100" y2="100"/><line x1="100" y1="0" x2="0" y2="100"/></svg><span class="ph-label">尚未上傳圖片</span>`;



    const propCount    = p.proposals.length;
    const selectedCount = p.proposals.filter(d => d.selected).length;

    const proposalMeta = propCount > 0
      ? selectedCount > 0
        ? `<span class="meta-sep">•</span><span class="meta-selected"><span class="meta-selected-check">✓</span> 選中 ${selectedCount} 次</span><span class="meta-sep">·</span><span>${propCount} 筆提案</span>`
        : `<span class="meta-sep">•</span><span>${propCount} 筆提案</span>`
      : '';

    card.innerHTML = `
      <div class="card-img">${imgHtml}</div>
      <div class="card-body">
        <div class="card-name-row">
          <span class="card-name">${p.name}</span>
          <span class="card-name-mats">${(mats.length ? mats : []).slice(0,2).map(m => `<span class="mtag mtag-mat">${m}</span>`).join('')}</span>
        </div>
        <div class="card-price">
          <div class="card-price-row">
            <span class="card-price-main">NT$${p.price_max}</span>
            ${p.price_min < p.price_max ? `<span class="card-price-min">NT$${p.price_min}起</span>` : ''}
          </div>
        </div>
        <div class="card-meta">
          <span>MOQ ${p.moq.toLocaleString()}</span>
          ${proposalMeta}
        </div>
        <div class="card-tag-row">
          ${p.themes.slice(0,2).map(t => `<span class="mtag">${t}</span>`).join('')}
          ${p.tag ? `<span class="mtag">${p.tag}</span>` : ''}
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

// ════════════════════════════════════
// Clear
// ════════════════════════════════════
function clearAll() {
  selMats.clear(); selThemes.clear(); selInds.clear(); selTags.clear();
  selBudget = 'all'; selMoq = 'all';
  document.querySelectorAll('#budgetChips .chip').forEach(b => b.classList.toggle('on', b.dataset.budget === 'all'));
  document.querySelectorAll('#moqChips .chip').forEach(b => b.classList.toggle('on', b.dataset.moq === 'all'));
  render();
}

// ════════════════════════════════════
// Slide-over
// ════════════════════════════════════
function openPeek(p) {
  const mats      = getMats(p.material);
  const nas        = p.nas_path || `\\\\COZU-NAS\\提案資料\\禮贈品\\${p.name}`;
  const proposals  = p.proposals;

  const imgHtml = p.image_url
    ? `<img src="${p.image_url}" alt="${p.name}" />`
    : `<svg style="position:absolute;inset:0;width:100%;height:100%;color:#e2e2e2" viewBox="0 0 100 100" preserveAspectRatio="none"><line x1="0" y1="0" x2="100" y2="100" stroke="currentColor" stroke-width="1"/><line x1="100" y1="0" x2="0" y2="100" stroke="currentColor" stroke-width="1"/></svg><span style="position:relative;font-size:10px;color:#bbb;">尚未上傳圖片</span>`;

  const proposalsHtml = proposals.length > 0
    ? proposals.map(d => `
        <div class="deal-row${d.selected ? ' selected' : ''}">
          <span class="deal-co">${d.company}</span>
          ${d.selected ? `<span class="deal-selected-badge">✓ 客戶選中</span>` : ''}
          <span class="deal-occ">· ${d.occasion}</span>
          <span class="deal-yr">${d.year}</span>
          ${d.slide_url
            ? `<a class="slide-link" href="${d.slide_url}" target="_blank" rel="noopener noreferrer" style="margin-top:0;padding:3px 8px;font-size:11px;">
                 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:11px;height:11px;">
                   <path d="M21 8 12 3 3 8v8l9 5 9-5z"/><path d="M3 8l9 5 9-5M12 13v8"/>
                 </svg>
                 簡報
               </a>`
            : ''}
        </div>`).join('')
    : `<div class="deal-empty">尚無提案紀錄</div>`;

  document.getElementById('peekBody').innerHTML = `
    <div class="peek-img">${imgHtml}</div>
    <div class="peek-name">${p.name}</div>
    <div class="peek-price">
      <div class="peek-price-row">
        <span class="peek-price-main">NT$${p.price_max}</span>
        ${p.price_min < p.price_max ? `<span class="peek-price-min">NT$${p.price_min}起</span>` : ''}
      </div>
      ${p.priceNote ? `<div class="peek-price-note">${p.priceNote}</div>` : ''}
    </div>

    <div class="dl">
      <div class="dl-title">規格</div>
      <div class="dl-row"><span class="dl-key">材質</span><span class="dl-val">${p.material}</span></div>
      <div class="dl-row"><span class="dl-key">最低訂購量</span><span class="dl-val">${p.moq.toLocaleString()} 件</span></div>
      <div class="dl-row"><span class="dl-key">風格</span><span class="dl-val">${p.tag}</span></div>
      <div class="dl-row">
        <span class="dl-key">材質分類</span>
        <span class="dl-val"><div class="pills">${(mats.length ? mats : ['—']).map(m => `<span class="pill">${m}</span>`).join('')}</div></span>
      </div>
      ${p.last_updated_time ? `<div class="dl-row"><span class="dl-key">最後更新時間</span><span class="dl-val">${p.last_updated_time}</span></div>` : ''}
    </div>

    <div class="dl">
      <div class="dl-title">適合場合</div>
      <div class="pills">${p.themes.map(t => `<span class="pill">${t}</span>`).join('')}</div>
    </div>

    <div class="dl">
      <div class="dl-title">適合產業</div>
      <div class="pills">${p.industries.map(i => `<span class="pill">${i}</span>`).join('')}</div>
    </div>

    <div class="dl">
      <div class="dl-title">提案紀錄</div>
      ${proposalsHtml}
    </div>

    <div class="dl">
      <div class="dl-title">NAS 資料路徑</div>
      <div class="nas-box">
        <span class="nas-path" id="nasPath">${nas}</span>
        <button class="copy-btn" id="copyBtn" onclick="copyNas('${nas.replace(/'/g,"\\'")}')">複製</button>
      </div>
    </div>`;

  document.getElementById('scrim').style.display = 'block';
  document.getElementById('peek').style.display  = 'flex';
  document.body.style.overflow = 'hidden';
}

function closePeek() {
  document.getElementById('scrim').style.display = 'none';
  document.getElementById('peek').style.display  = 'none';
  document.body.style.overflow = '';
}

function copyNas(path) {
  navigator.clipboard?.writeText(path).then(() => {
    const btn = document.getElementById('copyBtn');
    if (!btn) return;
    btn.textContent = '已複製';
    setTimeout(() => { if (document.getElementById('copyBtn')) btn.textContent = '複製'; }, 1400);
  });
}

// ════════════════════════════════════
// Tab switch (stub)
// ════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`)?.classList.add('active');
}

// ════════════════════════════════════
// Init
// ════════════════════════════════════
(async () => {
  try {
    products = await loadData();
    // 右上角：取所有商品中最新的 last_updated_time，若無則顯示載入時間
    const latestUpdate = products
      .map(p => p.last_updated_time)
      .filter(Boolean)
      .sort()
      .pop();
    document.getElementById('lastUpdated').textContent =
      latestUpdate ? `最後更新 ${latestUpdate}` : (() => {
        const now = new Date();
        return `載入於 ${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      })();
    document.getElementById('stateLoading').style.display = 'none';
    document.getElementById('cardGrid').style.display     = 'grid';
    buildRail();
    render();
  } catch (e) {
    document.getElementById('stateLoading').style.display = 'none';
    document.getElementById('stateError').style.display   = 'block';
    console.error(e);
  }
})();
</script>
